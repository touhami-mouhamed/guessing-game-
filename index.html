<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Guess Game</title>
</head>

<body>
    <div class="container">
        <div class="section1">
            <button id="reset">again!</button>
            <h5> (between 1 and 20)</h5>
        </div>
        <div class="section2">
            <h1>guess my number !</h1>
        </div>
        <div class="section3">
            <h1>?</h1>
        </div>
        <div class="section4">
            <div class="simple-grid">
                <input type="number" id="field">
                <div class="score">
                    <h4>Score: <span id="score">20</span></h4>
                    <h4>highest score : <span id="highest">20</span></h4>
                </div>
            </div>
            <h5 class="hint">start guessing ...</h5>
            <button class="btn">check !</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
